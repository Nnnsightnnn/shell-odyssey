# Network Learning Lab - DNS Configuration
# This dnsmasq instance provides DNS for the lab environment

# Don't use /etc/resolv.conf
no-resolv

# Use Google DNS as upstream
server=8.8.8.8
server=8.8.4.4

# Local domain
domain=lab.local
local=/lab.local/

# Expand simple names using local domain
expand-hosts

# Log queries for learning purposes
log-queries

# Listen on all interfaces
interface=*

# Don't forward short names
domain-needed

# Custom host entries for the lab
# These make container names resolvable
address=/client/172.20.0.10
address=/server/172.20.0.20
address=/api/172.20.0.30
address=/database/172.21.0.40
address=/dns/172.20.0.53
address=/monitor/172.20.0.100

# Also add .lab.local domain entries
address=/client.lab.local/172.20.0.10
address=/server.lab.local/172.20.0.20
address=/api.lab.local/172.20.0.30
address=/database.lab.local/172.21.0.40
address=/dns.lab.local/172.20.0.53
address=/monitor.lab.local/172.20.0.100

# Add some fake entries for learning
address=/web.lab.local/172.20.0.20
address=/db.lab.local/172.21.0.40

# Cache size
cache-size=1000
